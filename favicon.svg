<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Glass body -->
  <polygon points="14,18 20,54 44,54 50,18" fill="#FFD23F" stroke="#0B2D5B" stroke-width="3" stroke-linejoin="round"/>
  <!-- Glass rim -->
  <rect x="12" y="13" width="40" height="7" rx="3" fill="#0B2D5B"/>
  <!-- Lemonade liquid fill (slightly lower) -->
  <polygon points="16,22 21,51 43,51 48,22" fill="#FFEC80"/>
  <!-- Red straw -->
  <rect x="34" y="6" width="5" height="36" rx="2.5" fill="#C32026"/>
  <!-- Lemon slice on rim -->
  <circle cx="20" cy="15" r="7" fill="#FFD23F" stroke="#0B2D5B" stroke-width="2"/>
  <line x1="20" y1="8" x2="20" y2="22" stroke="#0B2D5B" stroke-width="1.2"/>
  <line x1="13" y1="15" x2="27" y2="15" stroke="#0B2D5B" stroke-width="1.2"/>
  <line x1="15" y1="10" x2="25" y2="20" stroke="#0B2D5B" stroke-width="1"/>
  <line x1="25" y1="10" x2="15" y2="20" stroke="#0B2D5B" stroke-width="1"/>
</svg>
